name: Production Data Refresh

on:
  schedule:
    # Noon America/Phoenix for daily validation.
    - cron: "0 19 * * *"
    # After typical West Coast game windows for game-day validation.
    - cron: "30 8 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Write a new ingestion even when the workbook checksum is unchanged
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          python -m pip install -r requirements.txt

      - name: Verify database secret
        run: test -n "$DATABASE_URL"

      - name: Apply database migrations
        run: pnpm db:migrate

      - name: Validate and refresh master data
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/refresh_production_data.py --write-postgres $FORCE_FLAG

      - name: Verify production health
        run: python scripts/smoke_production.py
