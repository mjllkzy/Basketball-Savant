name: NBA News Refresh

on:
  schedule:
    # Noon America/Phoenix for fan-facing news freshness.
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nba-news-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Validate news refresh script
        run: python -m py_compile scripts/refresh_nba_news.py

      - name: Refresh NBA.com news data
        run: python scripts/refresh_nba_news.py

      - name: Commit refreshed news when changed
        run: |
          set -euo pipefail
          if git diff --quiet -- src/lib/data/news.json; then
            echo "NBA news data is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/data/news.json
          git commit -m "Refresh NBA news data"
          git push
