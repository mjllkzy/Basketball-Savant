name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate ingestion script
        run: python -m py_compile scripts/ingest_nba_excel.py

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify clean generated state
        run: |
          git diff --check
          test -z "$(find public/data/player_profiles -name '* 2.json' -o -name '* copy*.json')"
          git diff --exit-code -- tsconfig.json
