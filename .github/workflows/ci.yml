name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate ingestion script
        run: |
          python -m py_compile scripts/ingest_nba_excel.py
          python -m py_compile scripts/import_player_contracts.py
          python -m py_compile scripts/sync_player_contract_options.py

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify clean generated state
        run: |
          git diff --check
          test -z "$(find public/data/player_profiles -name '* 2.json' -o -name '* copy*.json')"
          git diff --exit-code -- tsconfig.json
